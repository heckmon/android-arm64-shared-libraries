name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: 28c
      API_LEVEL: 35
      DEST_CPU: arm64
      ARCH: arm64
      HOST_OS: linux
      HOST_ARCH: x86_64
      HOST_GCC_DIR: /usr/bin
      ENVTARGET: aarch64-linux-android
      ENVHOST: linux-x86_64
      ENVANDROIDVER: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 g++ curl make git jq pkg-config unzip zip

      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          curl -sL https://dl.google.com/android/repository/android-ndk-r${NDK_VERSION}-linux.zip -o ndk.zip
          unzip -q ndk.zip -d $HOME/android-ndk
          echo "NDK=$HOME/android-ndk/android-ndk-r${NDK_VERSION}" >> $GITHUB_ENV

      - name: Get latest LTS Node version
        id: fetch_version
        run: |
          curl -s https://nodejs.org/dist/index.json \
          | jq -r '.[] | select(.lts != false) | .version' \
          | head -n1 > version.txt

          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Clone Node.js (with submodules)
        run: |
          git clone --recursive https://github.com/nodejs/node.git
          cd node
          git checkout ${{ steps.fetch_version.outputs.version }}
          git submodule update --init --recursive
          git clean -xfd

      - name: Setup Android toolchain
        run: |
          echo "COMPILERDIR=$NDK/toolchains/llvm/prebuilt/$ENVHOST/bin" >> $GITHUB_ENV

          echo "CC=$COMPILERDIR/${ENVTARGET}${ENVANDROIDVER}-clang" >> $GITHUB_ENV
          echo "CXX=$COMPILERDIR/${ENVTARGET}${ENVANDROIDVER}-clang++" >> $GITHUB_ENV
          echo "AR=$COMPILERDIR/llvm-ar" >> $GITHUB_ENV
          echo "STRIP=$COMPILERDIR/llvm-strip" >> $GITHUB_ENV

          echo "$COMPILERDIR" >> $GITHUB_PATH

      - name: Verify compiler
        run: |
          $CC --version
          $CXX --version

      - name: Configure Node.js
        run: |
          cd node
          ./configure \
            --dest-cpu=$DEST_CPU \
            --dest-os=android \
            --cross-compiling \
            --openssl-no-asm \
            --prefix=$GITHUB_WORKSPACE/out

      - name: Build Node.js
        run: |
          cd node

          # Fix trap handler (Android issue)
          sed -i 's|// Setup for shared library export.|#undef V8_TRAP_HANDLER_VIA_SIMULATOR\n#undef V8_TRAP_HANDLER_SUPPORTED\n#define V8_TRAP_HANDLER_SUPPORTED false\n\n// Setup for shared library export.|' deps/v8/src/trap-handler/trap-handler.h

          # CPU features object
          $CC -D__aarch64__ -c -o out/cpu-features.o \
            $NDK/sources/android/cpufeatures/cpu-features.c

          make -j$(nproc)
          make install

      - name: Package
        run: |
          cd out
          zip -r ../node-android-${{ steps.fetch_version.outputs.version }}.zip .

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-node-${{ steps.fetch_version.outputs.version }}
          files: node-android-${{ steps.fetch_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
